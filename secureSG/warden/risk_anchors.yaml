# Risk-concept anchors for tool-schema discovery (data, not code). A tool whose
# name + description embeds close (cosine) to any of these is flagged high-risk.
risk_anchors:
  - "execute arbitrary code or shell commands on the host"
  - "send data, files, or messages to external recipients"
  - "delete, destroy, or overwrite data"
  - "read secrets, credentials, API keys, or passwords"
  - "modify system configuration, permissions, or access controls"
  - "make outbound network requests to arbitrary URLs"
