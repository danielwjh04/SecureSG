name: Release Integrity

on:
  pull_request:
    paths:
      - ".github/workflows/release-integrity.yml"
      - "README.md"
      - "docs/release-integrity.md"
      - "integrations/**/secureai-guard.mjs"
      - "integrations/**/secureai-guard.test.mjs"
      - "integrations/shared/**"
      - "scanner/public/install.ps1"
      - "scanner/public/install.sh"
      - "scanner/public/secureai-guard.mjs"
      - "scanner/public/secureai-guard.test.mjs"
      - "scanner/package-lock.json"
      - "scanner/package.json"
      - "scripts/release-checksums.mjs"
      - "scripts/release-checksums.test.mjs"
      - "scripts/sync-adapter-redaction.mjs"
      - "scripts/sync-adapter-redaction.test.mjs"
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-assets:
    name: Build release assets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install scanner dependencies
        run: npm --prefix scanner ci

      - name: Run guard adapter tests
        run: |
          node --test \
            integrations/shared/secureai-redact.test.mjs \
            integrations/codex/secureai-guard.test.mjs \
            integrations/cursor/secureai-guard.test.mjs \
            integrations/claude-code/secureai-guard.test.mjs \
            scanner/public/secureai-guard.test.mjs \
            scripts/sync-adapter-redaction.test.mjs

      - name: Check adapter redaction drift
        run: node scripts/sync-adapter-redaction.mjs --check

      - name: Run release checksum tests
        run: node --test scripts/release-checksums.test.mjs

      - name: Build scanner dist
        run: npm --prefix scanner run build

      - name: Build release asset bundle
        run: node scripts/release-checksums.mjs release-assets

      - name: Verify checksums
        run: cd release-assets && sha256sum -c SHA256SUMS.txt

      - name: Check installer syntax
        run: |
          bash -n scanner/public/install.sh
          pwsh -NoProfile -Command '
          $content = Get-Content -Raw -LiteralPath "scanner/public/install.ps1"
          $errors = $null
          [System.Management.Automation.PSParser]::Tokenize($content, [ref]$errors) | Out-Null
          if ($errors) {
            $errors | Format-List
            exit 1
          }
          '

      - name: Check hook health output
        env:
          SECUREAI_API_KEY: sk_test_release_health
          SECUREAI_DEVICE_ID: dev_release_health
          SECUREAI_PRIVACY_MODE: maximum
          SECUREAI_INTEGRATION_VERSION: release-check
          SECUREAI_API_URL: https://user:secret@example.test/guard?token=leak
        run: |
          node release-assets/secureai-claude-code-guard.mjs --health > health.json
          node release-assets/secureai-cursor-guard.mjs --health > health-cursor.json
          node release-assets/secureai-codex-guard.mjs --health > health-codex.json
          node release-assets/secureai-browser-guard.mjs --health > health-browser.json
          python - <<'PY'
          import json
          from pathlib import Path

          health_files = {
              "health.json": "claude-code",
              "health-cursor.json": "cursor",
              "health-codex.json": "codex",
              "health-browser.json": "browser",
          }
          expected = {
              "status": "enabled",
              "auth": "present",
              "device_id": "present",
              "privacy_mode": "maximum",
              "integration_version": "present",
          }
          for file_name, provider in health_files.items():
              raw = Path(file_name).read_text(encoding="utf-8")
              health = json.loads(raw)
              if health.get("provider") != provider:
                  raise SystemExit(f"{file_name} provider was {health.get('provider')!r}, expected {provider!r}")
              for key, value in expected.items():
                  if health.get(key) != value:
                      raise SystemExit(f"{file_name} {key} was {health.get(key)!r}, expected {value!r}")
              if "sk_test_release_health" in raw or "dev_release_health" in raw or "user:secret" in raw or "token=leak" in raw:
                  raise SystemExit(f"{file_name} leaked a credential or device id")
          PY

      - name: Check release docs style
        run: |
          python - <<'PY'
          from pathlib import Path

          paths = [
              Path("README.md"),
              Path("docs/release-integrity.md"),
              Path(".github/workflows/release-integrity.yml"),
          ]
          failed = False
          for path in paths:
              text = path.read_text(encoding="utf-8")
              for mark, name in {chr(8212): "em dash", chr(8211): "en dash"}.items():
                  if mark in text:
                      print(f"{path}: contains {name}")
                      failed = True
          if failed:
              raise SystemExit(1)
          PY

      - name: Upload release asset bundle
        uses: actions/upload-artifact@v4
        with:
          name: secureai-release-assets
          path: release-assets/*
          if-no-files-found: error
          retention-days: 30

  attest-assets:
    name: Attest release assets
    needs: build-assets
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Download release asset bundle
        uses: actions/download-artifact@v4
        with:
          name: secureai-release-assets
          path: release-assets

      - name: Attest assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "release-assets/*"

  publish-tag-assets:
    name: Publish tag release assets
    needs: attest-assets
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release asset bundle
        uses: actions/download-artifact@v4
        with:
          name: secureai-release-assets
          path: release-assets

      - name: Publish assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" release-assets/* --title "$GITHUB_REF_NAME" --generate-notes
          fi
